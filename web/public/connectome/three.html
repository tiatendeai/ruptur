<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connectome Three</title>
    <style>
      :root {
        --bg-0: #020407;
        --bg-1: #07101a;
        --panel: rgba(4, 10, 18, 0.72);
        --line: rgba(255, 255, 255, 0.1);
        --text: #eff6ff;
        --muted: #91a2b6;
        --accent: #79d8ff;
        --accent-hot: #ff7b54;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 30% 15%, rgba(121,216,255,.1), transparent 22%),
          radial-gradient(circle at 75% 25%, rgba(255,123,84,.1), transparent 20%),
          radial-gradient(circle at 55% 80%, rgba(255,209,102,.06), transparent 24%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1));
      }

      #app {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
      }

      .hud {
        position: fixed;
        inset: 16px 16px auto 16px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        pointer-events: none;
      }

      .panel {
        pointer-events: auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 80px rgba(0,0,0,.32);
      }

      .left {
        padding: 16px 18px;
        width: min(360px, calc(100vw - 32px));
      }

      .right {
        padding: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .eyebrow {
        margin: 0;
        font-size: 11px;
        letter-spacing: .34em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 8px 0 0;
        font-size: clamp(28px, 3vw, 48px);
        letter-spacing: -.06em;
        line-height: .92;
      }

      p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 14px;
      }

      .btn {
        border: 1px solid var(--line);
        background: rgba(255,255,255,.06);
        color: var(--text);
        border-radius: 16px;
        height: 44px;
        min-width: 44px;
        padding: 0 14px;
        cursor: pointer;
      }

      .btn.primary {
        background: linear-gradient(180deg, rgba(121,216,255,.22), rgba(111,140,255,.12));
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .chip {
        border: 1px solid var(--line);
        background: rgba(255,255,255,.05);
        color: var(--text);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .chip.active {
        background: rgba(255,255,255,.12);
      }

      .details {
        position: fixed;
        right: 16px;
        bottom: 16px;
        width: min(340px, calc(100vw - 32px));
        padding: 16px 18px;
        pointer-events: auto;
      }

      .details h2 {
        margin: 0;
        font-size: 22px;
      }

      .details .mini {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .details dl {
        display: grid;
        grid-template-columns: 88px 1fr;
        gap: 8px 12px;
        margin: 14px 0 0;
        font-size: 12px;
      }

      .details dt {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .18em;
      }

      .details dd {
        margin: 0;
        color: var(--text);
      }

      .tooltip {
        position: fixed;
        z-index: 40;
        display: none;
        max-width: min(240px, calc(100vw - 24px));
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(4, 10, 18, 0.88);
        backdrop-filter: blur(14px);
        box-shadow: 0 18px 48px rgba(0,0,0,.28);
        pointer-events: none;
      }

      .tooltip strong {
        display: block;
        font-size: 13px;
      }

      .tooltip span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
        letter-spacing: .18em;
        text-transform: uppercase;
      }

      @media (max-width: 900px) {
        .hud {
          inset: 12px 12px auto 12px;
          flex-direction: column;
        }
        .right {
          align-self: flex-start;
        }
        .details {
          left: 12px;
          right: 12px;
          width: auto;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>

    <div class="hud">
      <section class="panel left">
        <p class="eyebrow">Neural Map</p>
        <h1>Jarvis / Ruptur</h1>
        <p>
          Viewer 3D real do connectome. O colapsado assume forma de cerebro e a
          massa interna vira tempestade neural sob controle.
        </p>
        <div class="chips" id="vision-chips"></div>
      </section>

      <section class="panel right">
        <button class="btn primary" id="collapse-brain">🧠</button>
        <button class="btn" id="expand-layout">Expandir</button>
        <button class="btn" id="reset-camera">Reset</button>
      </section>
    </div>

    <section class="panel details" id="details">
      <h2>Connectome Three</h2>
      <div class="mini">orbit · drag · depth · shell</div>
      <p>Arraste para orbitar. Clique em uma esfera para inspecionar.</p>
    </section>
    <div class="tooltip" id="tooltip"></div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const app = document.getElementById("app");
      const details = document.getElementById("details");
      const visionChips = document.getElementById("vision-chips");
      const tooltip = document.getElementById("tooltip");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 4000);
      camera.position.set(0, 0, 650);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      app.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 260;
      controls.maxDistance = 1200;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.28;

      const ambient = new THREE.AmbientLight(0xffffff, 0.8);
      scene.add(ambient);

      const pointA = new THREE.PointLight(0x79d8ff, 1600, 1600);
      pointA.position.set(-220, 180, 320);
      scene.add(pointA);

      const pointB = new THREE.PointLight(0xff7b54, 1200, 1400);
      pointB.position.set(280, -80, 260);
      scene.add(pointB);

      const pointC = new THREE.PointLight(0xffd166, 900, 1300);
      pointC.position.set(40, -220, -180);
      scene.add(pointC);

      const dataset = [
        {
          id: "adk",
          label: "ADK",
          layer: "brain",
          mass: 1.6,
          context: ["all", "jarvis", "factory"],
          tags: ["brain", "orchestration", "memory"],
          description: "Camada mestra de orquestracao, contexto e governanca que sustenta o Jarvis e a fabrica de maquinas.",
          base: [-90, 110, -80]
        },
        {
          id: "jarvis",
          label: "Jarvis",
          layer: "brain",
          mass: 1.8,
          context: ["all", "jarvis", "factory"],
          tags: ["ai", "operator", "clone"],
          description: "Inteligencia operacional viva que pensa, coordena, traduz contexto e aciona as camadas do ecossistema.",
          base: [70, 130, -140]
        },
        {
          id: "ruptur",
          label: "Ruptur",
          layer: "app",
          mass: 2.1,
          context: ["all", "ruptur", "growth"],
          tags: ["app", "crm", "operations"],
          description: "Aplicacao operacional que recebe a inteligencia do ADK e a converte em CRM, mensageria e cockpit comercial.",
          base: [40, 20, 30]
        },
        {
          id: "whatsapp",
          label: "WhatsApp",
          layer: "channel",
          mass: 1.8,
          context: ["all", "jarvis", "ruptur", "growth"],
          tags: ["channel", "sales", "interface"],
          description: "Canal transversal do ecossistema: interface do Jarvis, prospeccao, follow-up e conversa operacional.",
          base: [200, 15, 110]
        },
        {
          id: "lead",
          label: "Lead",
          layer: "domain",
          mass: 1.9,
          context: ["all", "growth", "ruptur"],
          tags: ["crm", "commercial", "funnel"],
          description: "Unidade central da maquina comercial. Tudo gravita em torno da captura, qualificacao, nutricao e conversao do lead.",
          base: [-60, -120, 40]
        },
        {
          id: "crm",
          label: "CRM",
          layer: "domain",
          mass: 1.5,
          context: ["all", "ruptur", "growth"],
          tags: ["pipeline", "records", "journey"],
          description: "Dominio de jornada comercial, pipeline, estagios e memoria de relacionamento.",
          base: [-80, -10, 0]
        },
        {
          id: "messaging",
          label: "Messaging",
          layer: "domain",
          mass: 1.4,
          context: ["all", "ruptur"],
          tags: ["dispatch", "providers", "delivery"],
          description: "Camada de envio, roteamento e abstracao entre provedores como UAZAPI e Baileys.",
          base: [150, -55, 80]
        },
        {
          id: "automation",
          label: "Automation",
          layer: "domain",
          mass: 1.2,
          context: ["all", "ruptur", "factory"],
          tags: ["runs", "workflows", "jobs"],
          description: "Execucao da automacao, cadencias, jobs, dispatches e acoplamento controlado entre decisao e operacao.",
          base: [70, -130, 120]
        },
        {
          id: "machine_builder",
          label: "Machine Builder",
          layer: "brain",
          mass: 1.45,
          context: ["all", "factory"],
          tags: ["builder", "templates", "synthesis"],
          description: "Camada que traduz metodo em sistema e permite construir novas maquinas comerciais com menos atrito.",
          base: [10, 120, -30]
        },
        {
          id: "prospect",
          label: "Prospect",
          layer: "domain",
          mass: 1.0,
          context: ["all", "growth"],
          tags: ["top-funnel", "source"],
          description: "Entrada inicial do funil, antes da qualificacao e antes da oportunidade real existir.",
          base: [-170, -20, 90]
        },
        {
          id: "qualification",
          label: "Qualification",
          layer: "domain",
          mass: 1.0,
          context: ["all", "growth"],
          tags: ["filter", "scoring", "fit"],
          description: "Camada que separa curiosidade de aderencia real e evita desperdiço de operacao comercial.",
          base: [-130, -80, 80]
        },
        {
          id: "followup",
          label: "Follow-up",
          layer: "domain",
          mass: 1.2,
          context: ["all", "growth", "ruptur"],
          tags: ["cadence", "reminder", "advance"],
          description: "Motor de cadencia e proximo passo. Onde previsibilidade deixa de ser discurso e vira ritmo operacional.",
          base: [40, -185, 90]
        },
        {
          id: "opportunity",
          label: "Opportunity",
          layer: "domain",
          mass: 1.2,
          context: ["all", "growth"],
          tags: ["deal", "revenue", "closing"],
          description: "Entidade onde o pipeline se aproxima do dinheiro e exige leitura de risco, timing e fechamento.",
          base: [140, -145, 80]
        },
        {
          id: "cockpit",
          label: "Cockpit",
          layer: "app",
          mass: 1.1,
          context: ["all", "ruptur"],
          tags: ["ui", "operations", "human-loop"],
          description: "Superficie humana do sistema: leitura, override, rastreabilidade e controle operacional.",
          base: [180, 85, 20]
        }
      ];

      const links = [
        ["adk", "jarvis"],
        ["adk", "machine_builder"],
        ["jarvis", "whatsapp"],
        ["ruptur", "crm"],
        ["ruptur", "messaging"],
        ["ruptur", "automation"],
        ["ruptur", "cockpit"],
        ["crm", "lead"],
        ["lead", "followup"],
        ["followup", "opportunity"],
        ["prospect", "qualification"],
        ["qualification", "lead"],
        ["messaging", "whatsapp"],
        ["machine_builder", "jarvis"]
      ];

      const palette = {
        brain: 0x79d8ff,
        app: 0xff7b54,
        domain: 0xff6b6b,
        channel: 0xffd166,
        governance: 0xf472d0,
        infra: 0x8f96a3
      };

      let currentVision = "all";
      const visions = ["all", "jarvis", "factory", "ruptur", "growth"];
      const groups = new THREE.Group();
      scene.add(groups);

      const shellGroup = new THREE.Group();
      scene.add(shellGroup);

      const stars = new THREE.Points(
        new THREE.BufferGeometry().setAttribute(
          "position",
          new THREE.Float32BufferAttribute(
            Array.from({ length: 1600 }, () => [
              THREE.MathUtils.randFloatSpread(2200),
              THREE.MathUtils.randFloatSpread(1600),
              THREE.MathUtils.randFloatSpread(2000)
            ]).flat(),
            3
          )
        ),
        new THREE.PointsMaterial({ color: 0xffffff, size: 1.4, transparent: true, opacity: 0.32 })
      );
      scene.add(stars);

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const nodeMeshes = [];
      const nodeMap = new Map();
      const linkMeshes = [];
      let hoveredSphere = null;
      let selectedSphere = null;

      function buildBrainShell() {
        shellGroup.clear();

        const hemiMaterial = new THREE.MeshPhysicalMaterial({
          color: 0x0c1a28,
          transparent: true,
          opacity: 0.1,
          roughness: 0.34,
          metalness: 0.08,
          transmission: 0.18,
          side: THREE.DoubleSide,
        });

        const leftGeometry = new THREE.SphereGeometry(188, 42, 32);
        leftGeometry.scale(1.05, 1.02, 0.92);
        const leftHemi = new THREE.Mesh(leftGeometry, hemiMaterial.clone());
        leftHemi.position.set(-105, 16, -26);
        shellGroup.add(leftHemi);

        const rightGeometry = new THREE.SphereGeometry(188, 42, 32);
        rightGeometry.scale(1.05, 1.02, 0.92);
        const rightHemi = new THREE.Mesh(rightGeometry, hemiMaterial.clone());
        rightHemi.position.set(105, 16, -26);
        shellGroup.add(rightHemi);

        const cerebellumGeometry = new THREE.SphereGeometry(92, 28, 24);
        cerebellumGeometry.scale(1.08, 0.72, 0.84);
        const cerebellum = new THREE.Mesh(cerebellumGeometry, hemiMaterial.clone());
        cerebellum.position.set(0, -150, -86);
        shellGroup.add(cerebellum);

        [leftGeometry, rightGeometry, cerebellumGeometry].forEach((geometry, index) => {
          const wire = new THREE.LineSegments(
            new THREE.WireframeGeometry(geometry),
            new THREE.LineBasicMaterial({
              color: index === 2 ? 0xff7b54 : 0x79d8ff,
              transparent: true,
              opacity: index === 2 ? 0.16 : 0.14
            })
          );
          if (index === 0) wire.position.copy(leftHemi.position);
          if (index === 1) wire.position.copy(rightHemi.position);
          if (index === 2) wire.position.copy(cerebellum.position);
          shellGroup.add(wire);
        });

        const groove = new THREE.Mesh(
          new THREE.CapsuleGeometry(10, 292, 10, 24),
          new THREE.MeshBasicMaterial({ color: 0xff7b54, transparent: true, opacity: 0.12 })
        );
        groove.rotation.z = Math.PI / 2;
        groove.rotation.y = Math.PI / 2;
        groove.position.set(0, 8, -24);
        shellGroup.add(groove);
      }

      function createAtomCore(radius, color) {
        const atom = new THREE.Group();
        const nucleus = new THREE.Mesh(
          new THREE.SphereGeometry(radius * 0.16, 18, 18),
          new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: new THREE.Color(color).multiplyScalar(0.55),
            roughness: 0.24,
            metalness: 0.12
          })
        );
        atom.add(nucleus);

        const orbitMaterial = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.46
        });

        const ringA = new THREE.Mesh(new THREE.TorusGeometry(radius * 0.38, Math.max(0.6, radius * 0.014), 12, 48), orbitMaterial.clone());
        const ringB = new THREE.Mesh(new THREE.TorusGeometry(radius * 0.28, Math.max(0.5, radius * 0.012), 12, 48), orbitMaterial.clone());
        ringB.rotation.x = Math.PI / 2.8;
        const ringC = new THREE.Mesh(new THREE.TorusGeometry(radius * 0.33, Math.max(0.5, radius * 0.012), 12, 48), orbitMaterial.clone());
        ringC.rotation.y = Math.PI / 2.5;
        atom.add(ringA, ringB, ringC);

        const electronMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const electrons = [
          new THREE.Mesh(new THREE.SphereGeometry(radius * 0.06, 12, 12), electronMaterial),
          new THREE.Mesh(new THREE.SphereGeometry(radius * 0.05, 12, 12), electronMaterial),
          new THREE.Mesh(new THREE.SphereGeometry(radius * 0.05, 12, 12), electronMaterial),
        ];
        electrons.forEach((electron) => atom.add(electron));

        atom.userData = { radius, electrons };
        return atom;
      }

      function visibleForVision(node) {
        return node.context.includes("all") || node.context.includes(currentVision);
      }

      function buildNodes() {
        groups.clear();
        nodeMeshes.length = 0;
        linkMeshes.length = 0;
        nodeMap.clear();

        dataset.forEach((node) => {
          const color = palette[node.layer] || 0xffffff;
          const radius = 10 + node.mass * 10;
          const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(radius, 28, 28),
            new THREE.MeshPhysicalMaterial({
              color,
              roughness: 0.28,
              metalness: 0.08,
              clearcoat: 0.9,
              clearcoatRoughness: 0.16,
              transmission: 0.08,
              emissive: new THREE.Color(color).multiplyScalar(0.12)
            })
          );
          sphere.position.set(...node.base);
          sphere.userData = { ...node, radius };

          const wire = new THREE.LineSegments(
            new THREE.WireframeGeometry(new THREE.SphereGeometry(radius * 1.005, 18, 16)),
            new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.12 })
          );
          sphere.add(wire);

          const atom = createAtomCore(radius, color);
          sphere.add(atom);

          const labelCanvas = document.createElement("canvas");
          labelCanvas.width = 512;
          labelCanvas.height = 160;
          const lctx = labelCanvas.getContext("2d");
          lctx.fillStyle = "rgba(239,246,255,0.95)";
          lctx.font = "600 42px system-ui";
          lctx.textAlign = "center";
          lctx.fillText(node.label, 256, 74);
          lctx.fillStyle = "rgba(145,162,182,0.9)";
          lctx.font = "26px system-ui";
          lctx.fillText(node.layer, 256, 120);
          const label = new THREE.Sprite(
            new THREE.SpriteMaterial({
              map: new THREE.CanvasTexture(labelCanvas),
              transparent: true,
              depthWrite: false
            })
          );
          label.position.set(0, radius + 24, 0);
          label.scale.set(110, 34, 1);
          sphere.add(label);

          groups.add(sphere);
          nodeMeshes.push({ sphere, atom, label, node });
          nodeMap.set(node.id, sphere);
        });

        links.forEach(([fromId, toId]) => {
          const from = nodeMap.get(fromId);
          const to = nodeMap.get(toId);
          if (!from || !to) return;
          const geom = new THREE.BufferGeometry();
          const mat = new THREE.LineBasicMaterial({ color: 0x79d8ff, transparent: true, opacity: 0.34 });
          const line = new THREE.Line(geom, mat);
          line.userData = { fromId, toId };
          groups.add(line);
          linkMeshes.push(line);
        });

        applyVision();
      }

      function setBrainLayout() {
        const compactMap = {
          adk: [-150, 108, -28],
          jarvis: [150, 112, -40],
          machine_builder: [0, 132, -12],
          ruptur: [0, 28, 96],
          crm: [-118, 12, 48],
          messaging: [126, -2, 54],
          cockpit: [138, 70, 46],
          whatsapp: [178, 28, 110],
          lead: [-70, -96, 88],
          automation: [28, -76, 46],
          prospect: [-182, 24, 70],
          qualification: [-144, -44, 82],
          followup: [6, -152, 82],
          opportunity: [118, -124, 72]
        };
        dataset.forEach((node, index) => {
          const base = compactMap[node.id] || [0, 0, 0];
          const wobble = (index % 3) - 1;
          node.base = [
            base[0] + wobble * 5,
            base[1] + Math.sin(index * 1.7) * 4,
            base[2] + Math.cos(index * 1.1) * 4
          ];
        });
        buildNodes();
      }

      function setExpandedLayout() {
        const map = {
          adk: [-90, 110, -80],
          jarvis: [70, 130, -140],
          ruptur: [40, 20, 30],
          whatsapp: [200, 15, 110],
          lead: [-60, -120, 40],
          crm: [-80, -10, 0],
          messaging: [150, -55, 80],
          automation: [70, -130, 120],
          machine_builder: [10, 120, -30],
          prospect: [-170, -20, 90],
          qualification: [-130, -80, 80],
          followup: [40, -185, 90],
          opportunity: [140, -145, 80],
          cockpit: [180, 85, 20]
        };
        dataset.forEach((node) => { node.base = map[node.id] || [0, 0, 0]; });
        buildNodes();
      }

      function applyVision() {
        nodeMeshes.forEach(({ sphere, node }) => {
          const visible = visibleForVision(node);
          sphere.visible = visible;
        });
        linkMeshes.forEach((line) => {
          const from = dataset.find((item) => item.id === line.userData.fromId);
          const to = dataset.find((item) => item.id === line.userData.toId);
          line.visible = visibleForVision(from) && visibleForVision(to);
        });
      }

      function relatedCount(nodeId) {
        return links.filter(([fromId, toId]) => fromId === nodeId || toId === nodeId).length;
      }

      function setDetailsFromNode(node) {
        const contexts = node.context.join(" · ");
        const tags = node.tags.join(", ");
        details.innerHTML = `
          <h2>${node.label}</h2>
          <div class="mini">${node.layer} · massa ${node.mass.toFixed(1)} · ${contexts}</div>
          <p>${node.description}</p>
          <dl>
            <dt>Layer</dt><dd>${node.layer}</dd>
            <dt>Contextos</dt><dd>${contexts}</dd>
            <dt>Tags</dt><dd>${tags}</dd>
            <dt>Ligacoes</dt><dd>${relatedCount(node.id)}</dd>
          </dl>
        `;
      }

      function setDetails(title, text) {
        details.innerHTML = `
          <h2>${title}</h2>
          <div class="mini">three.js · connectome · depth</div>
          <p>${text}</p>
        `;
      }

      function setHoverTooltip(node, x, y) {
        if (!node) {
          tooltip.style.display = "none";
          return;
        }
        tooltip.innerHTML = `<strong>${node.label}</strong><span>${node.layer} · ${node.context.join(" · ")}</span>`;
        tooltip.style.display = "block";
        tooltip.style.left = `${Math.min(window.innerWidth - 252, x + 16)}px`;
        tooltip.style.top = `${Math.min(window.innerHeight - 82, y + 16)}px`;
      }

      function applySelection(nextSphere) {
        if (selectedSphere && selectedSphere.material) {
          const color = palette[selectedSphere.userData.layer] || 0xffffff;
          selectedSphere.material.emissive = new THREE.Color(color).multiplyScalar(0.12);
        }
        selectedSphere = nextSphere;
        if (selectedSphere?.material) {
          const color = palette[selectedSphere.userData.layer] || 0xffffff;
          selectedSphere.material.emissive = new THREE.Color(color).multiplyScalar(0.28);
        }
      }

      visions.forEach((vision) => {
        const btn = document.createElement("button");
        btn.className = `chip ${vision === currentVision ? "active" : ""}`;
        btn.textContent = vision;
        btn.addEventListener("click", () => {
          currentVision = vision;
          [...visionChips.children].forEach((chip) => chip.classList.remove("active"));
          btn.classList.add("active");
          applyVision();
        });
        visionChips.appendChild(btn);
      });

      document.getElementById("collapse-brain").addEventListener("click", () => {
        setBrainLayout();
        setDetails("Modo Cerebro", "A tempestade neural recolhe para dentro do envelope do cerebro.");
      });

      document.getElementById("expand-layout").addEventListener("click", () => {
        setExpandedLayout();
        setDetails("Modo Expandido", "Os dominios voltam a se abrir e revelar mais claramente suas relacoes.");
      });

      document.getElementById("reset-camera").addEventListener("click", () => {
        camera.position.set(0, 0, 650);
        controls.target.set(0, 0, 0);
        controls.update();
      });

      renderer.domElement.addEventListener("pointerdown", () => {
        controls.autoRotate = false;
      });

      renderer.domElement.addEventListener("pointerleave", () => {
        hoveredSphere = null;
        setHoverTooltip(null);
      });

      renderer.domElement.addEventListener("pointermove", (event) => {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(nodeMeshes.map((item) => item.sphere), false);
        if (hits.length) {
          hoveredSphere = hits[0].object;
          renderer.domElement.style.cursor = "pointer";
          setHoverTooltip(hoveredSphere.userData, event.clientX, event.clientY);
        } else {
          hoveredSphere = null;
          renderer.domElement.style.cursor = "grab";
          setHoverTooltip(null);
        }
      });

      renderer.domElement.addEventListener("click", (event) => {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(nodeMeshes.map((item) => item.sphere), false);
        if (hits.length) {
          const hitSphere = hits[0].object;
          applySelection(hitSphere);
          setDetailsFromNode(hitSphere.userData);
        }
      });

      buildBrainShell();
      setBrainLayout();

      const clock = new THREE.Clock();

      function animate() {
        const t = clock.getElapsedTime();
        nodeMeshes.forEach(({ sphere, atom, node }, index) => {
          const wave = 1 + Math.sin(t * 1.1 + index) * 0.015;
          sphere.scale.setScalar(wave);

          const radius = atom.userData.radius;
          const [electronA, electronB, electronC] = atom.userData.electrons;
          electronA.position.set(
            Math.cos(t * (0.9 + node.mass * 0.08) + index) * radius * 0.38,
            Math.sin(t * (0.9 + node.mass * 0.08) + index) * radius * 0.12,
            0
          );
          electronB.position.set(
            0,
            Math.cos(t * (1.1 + node.mass * 0.06) + index * 0.7) * radius * 0.22,
            Math.sin(t * (1.1 + node.mass * 0.06) + index * 0.7) * radius * 0.28
          );
          electronC.position.set(
            Math.sin(t * (1.25 + node.mass * 0.05) + index * 0.4) * radius * 0.3,
            0,
            Math.cos(t * (1.25 + node.mass * 0.05) + index * 0.4) * radius * 0.33
          );

          atom.rotation.y += 0.004 + node.mass * 0.0008;
          atom.rotation.x += 0.002;
        });

        linkMeshes.forEach((line) => {
          const from = nodeMap.get(line.userData.fromId);
          const to = nodeMap.get(line.userData.toId);
          const midpoint = from.position.clone().add(to.position).multiplyScalar(0.5);
          const lift = 26 + Math.abs(from.position.x - to.position.x) * 0.08;
          midpoint.y += lift;
          midpoint.z -= 18;
          const curve = new THREE.QuadraticBezierCurve3(from.position.clone(), midpoint, to.position.clone());
          line.geometry.setFromPoints(curve.getPoints(20));
        });

        shellGroup.rotation.y = t * 0.032;
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
