services:
  saas-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WARMUP_RUNTIME_HOST: 0.0.0.0
      WARMUP_RUNTIME_PORT: 4173
    networks:
      - kvm2_default
    labels:
      traefik.enable: "true"
      traefik.docker.network: "kvm2_default"
      traefik.http.routers.saas-web.entrypoints: websecure
      traefik.http.routers.saas-web.rule: "Host(`app.ruptur.cloud`) || Host(`studio.ruptur.cloud`) || Host(`showcase.ruptur.cloud`) || Host(`site.ruptur.cloud`) || Host(`lp.ruptur.cloud`) || Host(`web.ruptur.cloud`) || Host(`ruptur.cloud`) || Host(`www.ruptur.cloud`)"
      traefik.http.routers.saas-web.tls.certresolver: le
      traefik.http.services.saas-web.loadbalancer.server.port: "4173"

networks:
  kvm2_default:
    external: true
