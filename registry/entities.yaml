# Registry derivado localmente para ativação do Jarvis no Ruptur.
# Fonte canônica primária: ../state/registry/manifestations.yaml
# Não substitui o STATE; apenas fecha a consulta local pedida na ativação.

version: 1
generated_from:
  activation: .jarvis-activation.md
  local_identity: .agent/agents/jarvis.md
  state_manifestations: ../state/registry/manifestations.yaml

entities:
  - id: jarvis
    uid: jarvis-root-001
    soulid_public: SOUL-JARVIS-0001
    local_identity:
      soul_id: RUPTUR-AGENT-0001
      role: "Maestro — Control Plane, Escalonamento e Coordenação"
      operator: diego
      platform_default: openai-codex
    public_genome: agents/jarvis/genome.yaml
    alpha_template: agents/jarvis/alpha.example.yaml
    activation_order:
      - constitution/jarvis.guardrails.md
      - registry/entities.yaml
      - memory/jarvis.state-model.md
    profiles:
      - id: ops
        focus: "operação comercial, CRM, pipeline, follow-up"
      - id: vcfo
        focus: "financeiro, receita, custos"
      - id: vcvo
        focus: "priorização estratégica, visão"
      - id: eggs
        focus: "execução operacional, missões, bloqueios"
    manifestations:
      - id: jarvis.canonical
        repository: state
        class: canonical_identity
        status: active
        authority_scope:
          - governanca
          - identidade
          - guardrails
          - memoria_curada
          - backlog_de_consolidacao
        source_refs:
          - README.md
          - constitution/jarvis.guardrails.md
          - constitution/ruptur.sources-and-queries.md
          - memory/jarvis.state-model.md
          - playbooks/jarvis.abort-policy.md
        sync_contract:
          - Diretrizes duráveis do Jarvis devem nascer no STATE ou ser promovidas para o STATE.
          - Nenhuma manifestação operacional pode sobrescrever esta camada fora do seu escopo técnico.
      - id: jarvis.ruptur.control_plane
        repository: codex/ruptur
        class: execution_manifestation
        status: active
        parent_manifestation: jarvis.canonical
        authority_scope:
          - orquestracao
          - coordenacao
          - execucao_tecnica
          - connectome_operacional
          - automacoes_ops
        source_refs:
          - JARVIS.md
          - .agent/agents/jarvis.md
          - ops/jarvis/
          - connectome/
        sync_contract:
          - Implementa o Jarvis no tronco operacional sem redefinir a governança canônica.
          - Divergências com o STATE devem ser registradas como decisão ou débito antes de harmonização.
