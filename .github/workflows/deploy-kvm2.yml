name: Deploy KVM2

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag ou commit para subir"
        required: true
        default: "work"
        type: string
      deploy_profiles:
        description: "Perfis do compose separados por virgula"
        required: true
        default: "edge,core,channels,warmup"
        type: string
      skip_smoke:
        description: "Pular smoke test remoto/publico"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-kvm2-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy manual no kvm2
    runs-on: ubuntu-latest
    environment: kvm2-production
    env:
      KVM2_SSH_HOST: ${{ vars.KVM2_SSH_HOST }}
      KVM2_SSH_PORT: ${{ vars.KVM2_SSH_PORT }}
      KVM2_SSH_USER: ${{ vars.KVM2_SSH_USER }}
      KVM2_SSH_PRIVATE_KEY: ${{ secrets.KVM2_SSH_PRIVATE_KEY }}
      KVM2_APP_ROOT: ${{ vars.KVM2_APP_ROOT }}
      KVM2_SHARED_ENV_FILE: ${{ vars.KVM2_SHARED_ENV_FILE }}
      KVM2_API_HEALTHCHECK_URL: ${{ vars.KVM2_API_HEALTHCHECK_URL }}
      KVM2_WEB_URL: ${{ vars.KVM2_WEB_URL }}
      KVM2_WARMUP_URL: ${{ vars.KVM2_WARMUP_URL }}
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Validar preflight do deploy
        run: bash ops/kvm2/preflight.sh

      - name: Gerar release id
        run: |
          release_id="$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          echo "RELEASE_ID=$release_id" >> "$GITHUB_ENV"

      - name: Preparar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KVM2_SSH_PRIVATE_KEY" > ~/.ssh/kvm2
          chmod 600 ~/.ssh/kvm2
          ssh-keyscan -p "${KVM2_SSH_PORT:-22}" "$KVM2_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Criar pasta remota da release
        run: |
          ssh -i ~/.ssh/kvm2 -p "${KVM2_SSH_PORT:-22}" "${KVM2_SSH_USER}@${KVM2_SSH_HOST}" \
            "mkdir -p '${KVM2_APP_ROOT}/releases/${RELEASE_ID}' '${KVM2_APP_ROOT}/shared' '${KVM2_APP_ROOT}/logs'"

      - name: Enviar release para o kvm2
        run: |
          rsync -az --delete \
            --exclude-from="ops/kvm2/rsync-excludes.txt" \
            -e "ssh -i ~/.ssh/kvm2 -p ${KVM2_SSH_PORT:-22}" \
            ./ "${KVM2_SSH_USER}@${KVM2_SSH_HOST}:${KVM2_APP_ROOT}/releases/${RELEASE_ID}/"

      - name: Aplicar deploy remoto
        run: |
          ssh -i ~/.ssh/kvm2 -p "${KVM2_SSH_PORT:-22}" "${KVM2_SSH_USER}@${KVM2_SSH_HOST}" \
            "bash '${KVM2_APP_ROOT}/releases/${RELEASE_ID}/ops/kvm2/remote_deploy.sh' \
              --app-root '${KVM2_APP_ROOT}' \
              --release-id '${RELEASE_ID}' \
              --shared-env-file '${KVM2_SHARED_ENV_FILE}' \
              --profiles '${{ inputs.deploy_profiles }}'"

      - name: Rodar smoke publico
        if: ${{ !inputs.skip_smoke }}
        run: bash ops/kvm2/smoke.sh "${KVM2_API_HEALTHCHECK_URL}" "${KVM2_WEB_URL}" "${KVM2_WARMUP_URL}"

      - name: Resumo da release
        run: |
          {
            echo "## Deploy KVM2"
            echo ""
            echo "- release: \`${RELEASE_ID}\`"
            echo "- ref: \`${{ inputs.git_ref }}\`"
            echo "- perfis: \`${{ inputs.deploy_profiles }}\`"
            echo "- smoke: \`${{ inputs.skip_smoke && 'pulado' || 'executado' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
