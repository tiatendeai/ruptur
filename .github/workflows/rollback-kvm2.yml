name: Rollback KVM2

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: "Release alvo. Se vazio, usa o link previous"
        required: false
        default: ""
        type: string
      deploy_profiles:
        description: "Perfis do compose separados por virgula"
        required: true
        default: "core,channels,warmup,observability-agents"
        type: string

permissions:
  contents: read

concurrency:
  group: rollback-kvm2-production
  cancel-in-progress: false

jobs:
  rollback:
    name: Rollback manual no kvm2
    runs-on: ubuntu-latest
    environment: kvm2-production
    env:
      KVM2_SSH_HOST: ${{ vars.KVM2_SSH_HOST }}
      KVM2_SSH_PORT: ${{ vars.KVM2_SSH_PORT }}
      KVM2_SSH_USER: ${{ vars.KVM2_SSH_USER }}
      KVM2_SSH_PRIVATE_KEY: ${{ secrets.KVM2_SSH_PRIVATE_KEY }}
      KVM2_APP_ROOT: ${{ vars.KVM2_APP_ROOT }}
      KVM2_SHARED_ENV_FILE: ${{ vars.KVM2_SHARED_ENV_FILE }}
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Validar preflight do rollback
        run: bash ops/kvm2/preflight.sh --skip-public-checks

      - name: Preparar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KVM2_SSH_PRIVATE_KEY" > ~/.ssh/kvm2
          chmod 600 ~/.ssh/kvm2
          ssh-keyscan -p "${KVM2_SSH_PORT:-22}" "$KVM2_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Aplicar rollback remoto
        run: |
          ssh -i ~/.ssh/kvm2 -p "${KVM2_SSH_PORT:-22}" "${KVM2_SSH_USER}@${KVM2_SSH_HOST}" \
            "bash '${KVM2_APP_ROOT}/current/ops/kvm2/remote_rollback.sh' \
              --app-root '${KVM2_APP_ROOT}' \
              --shared-env-file '${KVM2_SHARED_ENV_FILE}' \
              --profiles '${{ inputs.deploy_profiles }}' \
              ${INPUT_RELEASE_ID:+--release-id '${INPUT_RELEASE_ID}'}"
        env:
          INPUT_RELEASE_ID: ${{ inputs.release_id }}

      - name: Resumo do rollback
        run: |
          {
            echo "## Rollback KVM2"
            echo ""
            echo "- release alvo: \`${{ inputs.release_id || 'previous' }}\`"
            echo "- perfis: \`${{ inputs.deploy_profiles }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
